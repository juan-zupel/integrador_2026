<!DOCTYPE html>
<html lang="en" class="html_form">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stilo.css">
    <script src="script2.js" defer></script>
    <title>Registro_coacheo</title>
</head>
<body class="body_pagina_coacheo">
    <header>
        <h1 class="titulo"><div class="texto_titulo">Formulario de inscripción</div></h1>
        <div class="sub-tit-form">
            <h3>Por favor complete todo el formulario para inscribirse al sistema de coacheo</h3>
            <a href="index.html" class="enlaces_principales">Volver a la Página Principal</a>
        </div>
    </header>
    <main class="pagina_coacheo">
        <br>
        <form novalidate id="formulario">
            <fieldset class="fieldset">
                <label for=""><strong>Nombre</strong></label>
                <br>
                <input class="input-txt" required="true" type="text" id="inputNombre">
                <br>
                <br>
                <label for=""><strong>Email</strong></label>
                <br>
                <input class="input-txt" required="true" type="email" id="inputEmail">
                <br>
                <br>
                <label for=""><strong>Contraseña</strong></label>
                <br>
                <input class="input-txt" required="true" type="password" id="inptContrasenia">
                <br>
                <br>
                <label for=""><strong>Region</strong></label>
                <br>
                <br>
                <div class="input-elec">
                    <label><input type="radio" name="region" required="true" value="america_sur" class="inputReg">America_Sur</label>
                    <label><input type="radio" name="region" required="true" value="america_norte" class="inputReg">America_Norte</label>
                    <label><input type="radio" name="region" required="true" value="europa" class="inputReg">Europa</label>
                    <label><input type="radio" name="region" required="true" value="asia" class="inputReg">Asia</label>
                </div>
                <br>
                <br>
                <br>
                <label for=""><strong>Tipo de Coach</strong></label>
                <br>
                <br>
                <div class="input-elec">
                    <label><input type="radio" name="t_coach" required="true" value="virtual" class="inputTipoCoach">Virtual</label>
                    <label><input type="radio" name="t_coach" required="true" value="presencial" class="inputTipoCoach">Presencial</label>
                </div>
                <br>
                <br>
                <br>
                <label for=""><strong>Coach</strong></label>
                <br>
                <br>
                <div class="input-elec">
                    <label><input type="radio" name="coach" required="true" value="pochipum" class="inputCoach">Pochipum</label>
                    <label><input type="radio" name="coach" required="true" value="elmillor" class="inputCoach">Elmillor</label>
                    <label><input type="radio" name="coach" required="true" value="motroco" class="inputCoach">motroco</label>
                    <label><input type="radio" name="coach" required="true" value="ojo_ninja" class="inputCoach">Ojo_Ninja</label>
                </div>
                <br>
                <br>
                <br>
                <div class="objetivo-form">
                    <label for=""><strong>Objetivo</strong></label>
                    <p>(Escriba aquí su objetivo al pedir este servicio)</p>
                </div>
                <input class="input-txt" type="text" id="inputObjetivo" required="true">
                <br><br><br>
                <input type="submit" value="confirmar" class="boton-form" id="btn-form-1">
                <input type="reset" value="borrar" class="boton-form" id="btn-form-2">
            </fieldset>
        </form>
    </main>
</body>
</html>
